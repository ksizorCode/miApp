<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>¿Estás en clase?</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #1e1e2e;
    --green: #00ff88;
    --red: #ff3355;
    --amber: #ffaa00;
    --text: #e0e0f0;
    --muted: #555577;
    --glow-green: 0 0 20px #00ff8866, 0 0 60px #00ff8822;
    --glow-red: 0 0 20px #ff335566, 0 0 60px #ff335522;
    --glow-amber: 0 0 20px #ffaa0066;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 20px 16px 30px;
    overflow: hidden;
    position: relative;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Radial bg glow */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(0,255,136,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    text-align: center;
    z-index: 1;
    width: 100%;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 8vw, 2.8rem);
    letter-spacing: 0.15em;
    color: var(--text);
    text-shadow: 0 0 30px rgba(0,255,136,0.3);
  }

  header p {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* COMPASS */
  .compass-wrap {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .compass-ring {
    position: relative;
    width: min(72vw, 280px);
    height: min(72vw, 280px);
  }

  .compass-ring svg {
    width: 100%;
    height: 100%;
    transform-origin: center;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  /* Needle */
  .needle-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .needle {
    width: 4px;
    height: 80%;
    position: relative;
    transform-origin: center;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .needle::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-bottom: 55% solid var(--amber);
    filter: drop-shadow(var(--glow-amber));
  }

  .needle::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 45% solid var(--muted);
  }

  .compass-center {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .compass-center::after {
    content: '';
    width: 14px;
    height: 14px;
    background: var(--bg);
    border: 2px solid var(--amber);
    border-radius: 50%;
    box-shadow: var(--glow-amber);
    z-index: 10;
  }

  /* Info panels */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    z-index: 1;
  }

  .info-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    position: relative;
    overflow: hidden;
  }

  .info-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--amber);
    box-shadow: var(--glow-amber);
  }

  .info-card .label {
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .info-card .value {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--amber);
    text-shadow: var(--glow-amber);
    letter-spacing: 0.05em;
  }

  .info-card.full {
    grid-column: span 2;
  }

  /* Status banner */
  .status-banner {
    width: 100%;
    z-index: 1;
    border-radius: 12px;
    padding: 18px 20px;
    text-align: center;
    border: 1px solid var(--border);
    background: var(--panel);
    transition: all 0.5s ease;
    position: relative;
    overflow: hidden;
  }

  .status-banner.in-class {
    border-color: var(--green);
    box-shadow: var(--glow-green), inset 0 0 40px rgba(0,255,136,0.05);
  }

  .status-banner.out-class {
    border-color: var(--red);
    box-shadow: var(--glow-red), inset 0 0 40px rgba(255,51,85,0.05);
  }

  .status-banner.loading {
    border-color: var(--amber);
    box-shadow: var(--glow-amber);
  }

  .status-icon {
    font-size: 2rem;
    margin-bottom: 6px;
    display: block;
  }

  .status-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    letter-spacing: 0.1em;
    line-height: 1.1;
  }

  .status-banner.in-class .status-title { color: var(--green); text-shadow: var(--glow-green); }
  .status-banner.out-class .status-title { color: var(--red); text-shadow: var(--glow-red); }
  .status-banner.loading .status-title { color: var(--amber); text-shadow: var(--glow-amber); }

  .status-sub {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.1em;
  }

  /* Pulse anim for loading */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .pulse { animation: pulse 1.5s ease-in-out infinite; }

  /* Blink for in-class dot */
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  .blink { animation: blink 1s step-start infinite; }

  /* Rotate animation for loading compass */
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .spinning { animation: spin 2s linear infinite; }

  /* Coords display */
  .coords {
    font-size: 0.6rem;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.1em;
    z-index: 1;
  }

  .coords span { color: var(--text); }

  /* Error state */
  .error-msg {
    color: var(--red);
    font-size: 0.7rem;
    text-align: center;
    z-index: 1;
    max-width: 280px;
    line-height: 1.6;
  }

  /* Compass tick marks via SVG inline */
</style>
</head>
<body>

<header>
  <h1>LOCALIZADOR</h1>
  <p>Sistema de control de asistencia v1.0</p>
</header>

<!-- COMPASS -->
<div class="compass-wrap">
  <div class="compass-ring">
    <svg id="compassRose" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer ring -->
      <circle cx="100" cy="100" r="95" fill="none" stroke="#1e1e2e" stroke-width="1.5"/>
      <circle cx="100" cy="100" r="85" fill="none" stroke="#1e1e2e" stroke-width="0.5"/>

      <!-- Tick marks -->
      <g stroke="#555577" stroke-width="1">
        <!-- Major ticks every 45° -->
        <line x1="100" y1="8" x2="100" y2="20"/>
        <line x1="100" y1="180" x2="100" y2="192"/>
        <line x1="8" y1="100" x2="20" y2="100"/>
        <line x1="180" y1="100" x2="192" y2="100"/>
        <!-- 45° ticks -->
        <line x1="167.4" y1="32.6" x2="158.7" y2="41.3"/>
        <line x1="32.6" y1="32.6" x2="41.3" y2="41.3"/>
        <line x1="167.4" y1="167.4" x2="158.7" y2="158.7"/>
        <line x1="32.6" y1="167.4" x2="41.3" y2="158.7"/>
      </g>

      <!-- Minor ticks every 10° -->
      <g stroke="#2a2a3e" stroke-width="0.8">
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(10 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(20 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(30 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(50 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(60 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(70 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(80 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(100 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(110 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(120 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(130 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(140 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(150 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(160 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(170 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(190 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(200 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(210 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(220 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(230 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(240 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(250 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(260 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(280 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(290 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(300 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(310 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(320 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(330 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(340 100 100)"/>
        <line x1="100" y1="8" x2="100" y2="14" transform="rotate(350 100 100)"/>
      </g>

      <!-- Cardinal labels -->
      <text x="100" y="26" text-anchor="middle" font-family="'Space Mono', monospace" font-size="11" font-weight="700" fill="#ffaa00">N</text>
      <text x="100" y="183" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#555577">S</text>
      <text x="176" y="105" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#555577">E</text>
      <text x="24" y="105" text-anchor="middle" font-family="'Space Mono', monospace" font-size="10" fill="#555577">O</text>

      <!-- Target dot ring -->
      <circle id="targetRing" cx="100" cy="100" r="30" fill="none" stroke="#ffaa0033" stroke-width="1" stroke-dasharray="4 4"/>
    </svg>

    <!-- Needle -->
    <div class="needle-wrap">
      <div class="needle" id="needle"></div>
    </div>
    <div class="compass-center"></div>
  </div>
</div>

<!-- INFO CARDS -->
<div class="info-grid">
  <div class="info-card">
    <div class="label">Distancia</div>
    <div class="value" id="distVal">-- m</div>
  </div>
  <div class="info-card">
    <div class="label">Dirección</div>
    <div class="value" id="bearingVal">--°</div>
  </div>
  <div class="info-card full">
    <div class="label">Rumbo</div>
    <div class="value" id="cardinalVal" style="font-size:0.85rem; letter-spacing:0.02em">Calculando...</div>
  </div>
</div>

<!-- STATUS -->
<div class="status-banner loading" id="statusBanner">
  <span class="status-icon pulse" id="statusIcon">📡</span>
  <div class="status-title pulse" id="statusTitle">OBTENIENDO GPS</div>
  <div class="status-sub" id="statusSub">Esperando señal de posición...</div>
</div>

<!-- COORDS -->
<div class="coords" id="coordsDisplay">
  Tu posición: <span>--</span>
</div>

<script>
  const TARGET_LAT = 43.538058;
  const TARGET_LON = -5.705044;
  const RADIUS_M = 50;

  let currentHeading = 0;
  let compassAngle = 0;
  let deviceHeading = 0;

  // Haversine
  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function bearing(lat1, lon1, lat2, lon2) {
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
    const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
               Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  }

  function toCardinal(deg) {
    const dirs = ['Norte','Nornoreste','Noreste','Estenoreste','Este','Estesureste',
                  'Sureste','Sursureste','Sur','Sursuroeste','Suroeste','Oestesuroeste',
                  'Oeste','Oestenoroeste','Noroeste','Nornoroeste'];
    return dirs[Math.round(deg / 22.5) % 16];
  }

  function updateCompass(bear, dist) {
    // Rotate needle to point to target (relative to device heading)
    const needleAngle = bear - deviceHeading;
    document.getElementById('needle').style.transform = `rotate(${needleAngle}deg)`;

    // Rotate compass rose opposite to device heading
    document.getElementById('compassRose').style.transform = `rotate(${-deviceHeading}deg)`;

    document.getElementById('distVal').textContent = dist < 1000
      ? `${Math.round(dist)} m`
      : `${(dist/1000).toFixed(2)} km`;

    document.getElementById('bearingVal').textContent = `${Math.round(bear)}°`;
    document.getElementById('cardinalVal').textContent = toCardinal(bear);
  }

  function setStatus(type, icon, title, sub) {
    const banner = document.getElementById('statusBanner');
    banner.className = 'status-banner ' + type;
    document.getElementById('statusIcon').textContent = icon;
    document.getElementById('statusTitle').textContent = title;
    document.getElementById('statusSub').textContent = sub;

    // Remove pulse
    document.getElementById('statusIcon').classList.remove('pulse');
    document.getElementById('statusTitle').classList.remove('pulse');

    if (type === 'loading') {
      document.getElementById('statusIcon').classList.add('pulse');
      document.getElementById('statusTitle').classList.add('pulse');
    }
  }

  // Device orientation
  function setupOrientation() {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      // iOS 13+
      document.body.addEventListener('click', () => {
        DeviceOrientationEvent.requestPermission()
          .then(r => { if (r === 'granted') listenOrientation(); })
          .catch(console.error);
      }, { once: true });
    } else {
      listenOrientation();
    }
  }

  function listenOrientation() {
    window.addEventListener('deviceorientationabsolute', e => {
      if (e.alpha !== null) deviceHeading = (360 - e.alpha) % 360;
    }, true);
    window.addEventListener('deviceorientation', e => {
      if (e.webkitCompassHeading != null) {
        deviceHeading = e.webkitCompassHeading;
      } else if (e.alpha !== null) {
        deviceHeading = (360 - e.alpha) % 360;
      }
    }, true);
  }

  // GPS
  function startGPS() {
    if (!navigator.geolocation) {
      setStatus('out-class', '❌', 'SIN GPS', 'Tu dispositivo no soporta geolocalización');
      return;
    }

    navigator.geolocation.watchPosition(
      pos => {
        const { latitude: lat, longitude: lon, accuracy } = pos.coords;

        document.getElementById('coordsDisplay').innerHTML =
          `Tu posición: <span>${lat.toFixed(6)}, ${lon.toFixed(6)}</span><br>
           <span style="color:#555577">Precisión: ±${Math.round(accuracy)}m</span>`;

        const dist = haversine(lat, lon, TARGET_LAT, TARGET_LON);
        const bear = bearing(lat, lon, TARGET_LAT, TARGET_LON);

        updateCompass(bear, dist);

        if (dist <= RADIUS_M) {
          setStatus('in-class', '✅', '¡ESTÁS EN CLASE!', `A ${Math.round(dist)}m del destino · Dentro del radio`);
        } else {
          setStatus('out-class', '🥐', '¿QUÉ ESTÁS TOMANDO UNOS CHURRINOS?', `Estás a ${Math.round(dist) < 1000 ? Math.round(dist)+'m' : (dist/1000).toFixed(1)+'km'} de clase`);
        }
      },
      err => {
        let msg = 'Error desconocido';
        if (err.code === 1) msg = 'Permiso de ubicación denegado. Actívalo en ajustes.';
        if (err.code === 2) msg = 'GPS no disponible. Comprueba tu señal.';
        if (err.code === 3) msg = 'Tiempo de espera agotado. Reintentando...';
        setStatus('loading', '⚠️', 'ERROR GPS', msg);
      },
      {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
      }
    );
  }

  setupOrientation();
  startGPS();
</script>
</body>
</html>
