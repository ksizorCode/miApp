<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - PRLAPP</title>
        <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>📡 Sin conexión</h1>
    <p>Estás offline, pero puedes seguir aprendiendo PRL 💡</p>

    <button onclick="reintentar()">Reintentar conexión</button>

    <div class="status" id="estado"></div>
</div>

<script>
// 📡 Detectar conexión en tiempo real
function actualizarEstado() {
    const estado = document.getElementById('estado');
    estado.textContent = navigator.onLine 
        ? "🟢 Conexión recuperada"
        : "🔴 Sin conexión";
}

// 🔄 Reintentar
function reintentar() {
    location.reload();
}

// Eventos online/offline
window.addEventListener('online', actualizarEstado);
window.addEventListener('offline', actualizarEstado);

// Inicial
actualizarEstado();
</script>

</body>
</html>
