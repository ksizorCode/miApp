<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRL Geo App</title>

<style>
    body {
        font-family: Arial;
        text-align: center;
        margin-top: 50px;
    }

    #brujula {
        margin: 40px auto;
        width: 150px;
        height: 150px;
        border: 4px solid #333;
        border-radius: 50%;
        position: relative;
    }

    #flecha {
        width: 4px;
        height: 60px;
        background: red;
        position: absolute;
        top: 20px;
        left: 50%;
        transform-origin: bottom center;
        transform: translateX(-50%) rotate(0deg);
    }

    #distancia {
        font-size: 1.5em;
        margin-top: 20px;
    }

    #mensaje {
        font-size: 1.8em;
        margin-top: 20px;
    }
</style>
</head>
<body>

<h1>📍 Localizador PRL</h1>

<div id="brujula">
    <div id="flecha"></div>
</div>

<div id="distancia">Calculando distancia...</div>
<div id="mensaje">Detectando ubicación...</div>

<script>
// 📍 Punto objetivo
const latObjetivo = 43.538058;
const lonObjetivo = -5.705044;
const radio = 30;

// 📐 Distancia (Haversine)
function calcularDistancia(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;

    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);

    const a = Math.sin(dLat/2)**2 +
              Math.cos(toRad(lat1)) *
              Math.cos(toRad(lat2)) *
              Math.sin(dLon/2)**2;

    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// 🧭 Calcular rumbo (bearing)
function calcularRumbo(lat1, lon1, lat2, lon2) {
    const toRad = x => x * Math.PI / 180;
    const toDeg = x => x * 180 / Math.PI;

    const dLon = toRad(lon2 - lon1);

    const y = Math.sin(dLon) * Math.cos(toRad(lat2));
    const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
              Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);

    let brng = toDeg(Math.atan2(y, x));
    return (brng + 360) % 360;
}

// 📡 Obtener posición continuamente
navigator.geolocation.watchPosition(pos => {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const distancia = calcularDistancia(lat, lon, latObjetivo, lonObjetivo);
    const rumbo = calcularRumbo(lat, lon, latObjetivo, lonObjetivo);

    // 📏 Mostrar distancia
    document.getElementById("distancia").innerText =
        "Distancia: " + distancia.toFixed(1) + " metros";

    // 📍 Mensaje
    if (distancia <= radio) {
        document.getElementById("mensaje").innerText = "Estas en clase 👨‍🏫";
    } else {
        document.getElementById("mensaje").innerText = "Espero que sea la hora del pinchu 😏";
    }

    // 🧭 Rotar flecha hacia el objetivo
    document.getElementById("flecha").style.transform =
        `translateX(-50%) rotate(${rumbo}deg)`;

}, () => {
    document.getElementById("mensaje").innerText = "Error obteniendo ubicación";
});
</script>

</body>
</html>
