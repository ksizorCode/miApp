<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRL Brújula PRO</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 40px;
}

#brujula {
    margin: 30px auto;
    width: 180px;
    height: 180px;
    border: 5px solid #333;
    border-radius: 50%;
    position: relative;
}

#flecha {
    width: 6px;
    height: 70px;
    background: red;
    position: absolute;
    top: 20px;
    left: 50%;
    transform-origin: bottom center;
    transform: translateX(-50%) rotate(0deg);
    border-radius: 3px;
}

#distancia {
    font-size: 1.4em;
}

#mensaje {
    font-size: 1.8em;
    margin-top: 10px;
}
</style>
</head>
<body>

<h1>🧭 PRL Localizador</h1>

<div id="brujula">
    <div id="flecha"></div>
</div>

<div id="distancia">Calculando...</div>
<div id="mensaje">Detectando ubicación...</div>

<script>
// 📍 Coordenadas objetivo
const latObjetivo = 43.538058;
const lonObjetivo = -5.705044;
const radio = 30;

let heading = 0; // orientación del móvil

// 📐 Distancia (Haversine)
function calcularDistancia(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;

    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);

    const a = Math.sin(dLat/2)**2 +
              Math.cos(toRad(lat1)) *
              Math.cos(toRad(lat2)) *
              Math.sin(dLon/2)**2;

    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// 🧭 Rumbo al objetivo
function calcularRumbo(lat1, lon1, lat2, lon2) {
    const toRad = x => x * Math.PI / 180;
    const toDeg = x => x * 180 / Math.PI;

    const dLon = toRad(lon2 - lon1);

    const y = Math.sin(dLon) * Math.cos(toRad(lat2));
    const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
              Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);

    return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

// 📡 GPS en tiempo real
navigator.geolocation.watchPosition(pos => {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const distancia = calcularDistancia(lat, lon, latObjetivo, lonObjetivo);
    const rumbo = calcularRumbo(lat, lon, latObjetivo, lonObjetivo);

    // 📏 Mostrar distancia
    document.getElementById("distancia").innerText =
        "Distancia: " + distancia.toFixed(1) + " m";

    // 📍 Mensaje
    if (distancia <= radio) {
        document.getElementById("mensaje").innerText = "Estas en clase 👨‍🏫";
    } else {
        document.getElementById("mensaje").innerText = "Espero que sea la hora del pinchu 😏";
    }

    // 🧭 Ajustar flecha (rumbo - orientación móvil)
    const rotacion = rumbo - heading;

    document.getElementById("flecha").style.transform =
        `translateX(-50%) rotate(${rotacion}deg)`;

});

// 📱 Orientación del dispositivo
function activarOrientacion() {

    // iOS necesita permiso
    if (typeof DeviceOrientationEvent.requestPermission === "function") {
        DeviceOrientationEvent.requestPermission()
        .then(response => {
            if (response === "granted") {
                window.addEventListener("deviceorientation", manejarOrientacion);
            }
        });
    } else {
        // Android directamente
        window.addEventListener("deviceorientationabsolute", manejarOrientacion);
        window.addEventListener("deviceorientation", manejarOrientacion);
    }
}

// 📐 Leer orientación
function manejarOrientacion(event) {
    if (event.absolute && event.alpha !== null) {
        heading = 360 - event.alpha; // corrección brújula
    }
}

// Activar al tocar pantalla (requisito iOS)
document.body.addEventListener("click", activarOrientacion);

</script>

<p>👉 Toca la pantalla para activar la brújula (iPhone)</p>

</body>
</html>
